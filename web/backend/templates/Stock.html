{% extends "base.html" %}

{% block content %}

<div style="margin: 25px">

    <form method="POST">
        <input type="text" name="symbol" value = {{symbol}} readonly style="width: 20%">
        <input type="text" name="time" id="time" readonly style="width: 20%">
        <input type="text" name="price" id="price" readonly style="width: 20%">
        <input type="number" name="volume" value="0" style="width: 20%" />
        <select name="process" style="width: 18%">
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
        </select>
        <br><br>
        <button class="btn btn-secondary form-control">Submit</button>
    </form>

</div>

<script>
    function requestData() {

        var requests = $.get('/get_stock/{{symbol}}');
        var tm = requests.done(function (result) {
            document.getElementById("price").value = result[1];
            document.getElementById("time").value = result[0];
            setTimeout(requestData, 700);
        });
    }

    requestData();

</script>

{% endblock %}
